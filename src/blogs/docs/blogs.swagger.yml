paths:
  /api/blogs:
    get:
      summary: Get all blogs
      tags:
        - Blogs
      responses:
        "200":
          description: Success. Returns array of blogs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogViewModel"
    post:
      summary: Create a new blog
      tags:
        - Blogs
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogInputModel"
      responses:
        "201":
          description: Created. Returns created blog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogViewModel"
        "400":
          description: Bad request. Invalid input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResult"
        "401":
          description: Unauthorized

  /api/blogs/{id}:
    get:
      summary: Get blog by ID
      tags:
        - Blogs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Blog ID
      responses:
        "200":
          description: Success. Returns blog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogViewModel"
        "404":
          description: Not found
    put:
      summary: Update blog by ID
      tags:
        - Blogs
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Blog ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogInputModel"
      responses:
        "204":
          description: No content. Successfully updated
        "400":
          description: Bad request. Invalid input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResult"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      summary: Delete blog by ID
      tags:
        - Blogs
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Blog ID
      responses:
        "204":
          description: No content. Successfully deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

components:
  schemas:
    BlogInputModel:
      type: object
      required:
        - name
        - description
        - websiteUrl
      properties:
        name:
          type: string
          description: Blog name
          example: My Blog
          maxLength: 15
        description:
          type: string
          description: Blog description
          example: This is my personal blog
          maxLength: 500
        websiteUrl:
          type: string
          description: Blog website URL
          example: https://myblog.com
          maxLength: 100
          pattern: ^https:\/\/([a-zA-Z0-9_-]+\.)+[a-zA-Z0-9_-]+(\/[a-zA-Z0-9_-]+)*\/?$

    BlogViewModel:
      type: object
      required:
        - id
        - name
        - description
        - websiteUrl
      properties:
        id:
          type: string
          description: Blog ID
          example: 507f1f77bcf86cd799439011
        name:
          type: string
          description: Blog name
          example: My Blog
        description:
          type: string
          description: Blog description
          example: This is my personal blog
        websiteUrl:
          type: string
          description: Blog website URL
          example: https://myblog.com

    FieldError:
      type: object
      properties:
        message:
          type: string
          nullable: true
          description: Error message
          example: Name is too long
        field:
          type: string
          nullable: true
          description: Field that caused the error
          example: name

    ApiErrorResult:
      type: object
      properties:
        errorsMessages:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
          description: Array of validation errors

  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: "Basic authentication. Use credentials: admin / qwerty"
