paths:
  /api/posts:
    get:
      summary: Get all posts
      tags:
        - Posts
      responses:
        "200":
          description: Success. Returns array of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostViewModel"
    post:
      summary: Create a new post
      tags:
        - Posts
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInputModel"
      responses:
        "201":
          description: Created. Returns created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostViewModel"
        "400":
          description: Bad request. Invalid input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResult"
        "401":
          description: Unauthorized

  /api/posts/{id}:
    get:
      summary: Get post by ID
      tags:
        - Posts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Post ID
      responses:
        "200":
          description: Success. Returns post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostViewModel"
        "404":
          description: Not found
    put:
      summary: Update post by ID
      tags:
        - Posts
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Post ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInputModel"
      responses:
        "204":
          description: No content. Successfully updated
        "400":
          description: Bad request. Invalid input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResult"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      summary: Delete post by ID
      tags:
        - Posts
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Post ID
      responses:
        "204":
          description: No content. Successfully deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

components:
  schemas:
    PostInputModel:
      type: object
      required:
        - title
        - shortDescription
        - content
        - blogId
      properties:
        title:
          type: string
          description: Post title
          example: My First Post
          maxLength: 30
        shortDescription:
          type: string
          description: Short description of the post
          example: This is a short description
          maxLength: 100
        content:
          type: string
          description: Post content
          example: Full content of the post
          maxLength: 1000
        blogId:
          type: string
          description: ID of the blog this post belongs to
          example: 507f1f77bcf86cd799439011

    PostViewModel:
      type: object
      required:
        - id
        - title
        - shortDescription
        - content
        - blogId
        - blogName
      properties:
        id:
          type: string
          description: Post ID
          example: 507f1f77bcf86cd799439012
        title:
          type: string
          description: Post title
          example: My First Post
        shortDescription:
          type: string
          description: Short description of the post
          example: This is a short description
        content:
          type: string
          description: Post content
          example: Full content of the post
        blogId:
          type: string
          description: ID of the blog this post belongs to
          example: 507f1f77bcf86cd799439011
        blogName:
          type: string
          description: Name of the blog
          example: My Blog

    FieldError:
      type: object
      properties:
        message:
          type: string
          description: Error message
          example: Title is too long
        field:
          type: string
          description: Field that caused the error
          example: title

    ApiErrorResult:
      type: object
      properties:
        errorsMessages:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
          description: Array of validation errors
